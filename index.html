<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Яндекс Ventures — База стартапов</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #FFFFFF;
  --bg2: #F8F9FB;
  --bg3: #F1F3F7;
  --border: #E2E8F0;
  --accent: #F0531C;
  --accent-light: #FEF0EB;
  --accent-dark: #C93D10;
  --text: #1E293B;
  --text2: #5A6478;
  --text3: #8A929E;
  --green: #16A34A;
  --green-bg: #F0FDF4;
  --yellow: #B45309;
  --yellow-bg: #FFFBEB;
  --gray-bg: #F1F3F7;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg2);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.header {
  position: sticky; top: 0; z-index: 100;
  background: #fff;
  border-bottom: 1px solid var(--border);
}

.header-top {
  padding: 0 24px; height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid var(--accent);
}

.logo {
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.4px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}

.logo-dot { color: var(--accent); }
.logo-sub { font-weight: 400; color: var(--text3); font-size: 13px; }

.header-right { display: flex; align-items: center; gap: 10px; }

.refresh-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  background: var(--accent); color: white;
  border: none; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer; transition: background 0.15s;
}
.refresh-btn:hover { background: var(--accent-dark); }
.refresh-btn:disabled { background: var(--text3); cursor: not-allowed; }
.refresh-btn.loading svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.lang-toggle {
  display: flex; background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm); overflow: hidden;
}
.lang-btn {
  padding: 5px 11px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; background: none;
  color: var(--text3); font-family: 'Inter', sans-serif; transition: all 0.15s;
}
.lang-btn.active { background: var(--accent); color: white; }

.last-updated { font-size: 11px; color: var(--text3); white-space: nowrap; }

.layout {
  display: grid; grid-template-columns: 260px 1fr;
  min-height: calc(100vh - 54px);
  max-width: 1440px; margin: 0 auto;
}

.sidebar {
  background: #fff; border-right: 1px solid var(--border);
  padding: 18px 16px;
  position: sticky; top: 54px;
  height: calc(100vh - 54px); overflow-y: auto;
  display: flex; flex-direction: column; gap: 18px;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.search-wrap { position: relative; }
.search-input {
  width: 100%; background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 9px 12px 9px 34px;
  color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif;
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(240,83,28,0.08); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: var(--text3); pointer-events: none;
}

.filter-section { display: flex; flex-direction: column; gap: 7px; }
.filter-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3);
}
.filter-select {
  width: 100%; background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 30px 8px 11px; color: var(--text);
  font-size: 13px; font-family: 'Inter', sans-serif;
  outline: none; cursor: pointer; appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238A929E' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 10px center;
  transition: border-color 0.15s;
}
.filter-select:focus { border-color: var(--accent); }

.verdict-filters { display: flex; flex-direction: column; gap: 5px; }
.verdict-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 11px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); cursor: pointer;
  transition: all 0.15s; background: var(--bg2);
  font-size: 13px; color: var(--text2);
}
.verdict-chip:hover { border-color: var(--accent); color: var(--text); background: var(--accent-light); }
.verdict-chip.active { border-color: var(--accent); background: var(--accent-light); color: var(--text); }

.verdict-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.verdict-dot.pipeline { background: var(--green); }
.verdict-dot.study { background: #D97706; }
.verdict-dot.later { background: var(--text3); }
.verdict-dot.all { background: var(--accent); }

.verdict-count {
  margin-left: auto; font-size: 11px; font-weight: 600;
  color: var(--text3); background: var(--bg3);
  padding: 1px 7px; border-radius: 10px;
}

.reset-btn {
  width: 100%; padding: 8px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: none;
  color: var(--text2); font-size: 13px;
  font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
}
.reset-btn:hover { border-color: var(--accent); color: var(--accent); }

.main { padding: 20px 22px; }

.toolbar {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 14px; gap: 12px;
}
.results-info { font-size: 13px; color: var(--text2); }
.results-info strong { color: var(--text); font-weight: 600; }

.sort-select {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 7px 26px 7px 11px;
  color: var(--text); font-size: 12px; font-family: 'Inter', sans-serif;
  outline: none; cursor: pointer; appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238A929E' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 9px center;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}

.card {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  cursor: pointer; transition: all 0.15s;
  display: flex; flex-direction: column; gap: 11px;
  position: relative; overflow: hidden;
}
.card::after {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: transparent; transition: background 0.15s;
}
.card:hover { border-color: rgba(240,83,28,0.3); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.card:hover::after { background: var(--accent); }

.card-header { display: flex; align-items: flex-start; gap: 11px; }
.company-avatar {
  width: 40px; height: 40px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: white;
  flex-shrink: 0; letter-spacing: -0.5px;
}
.card-title-wrap { flex: 1; min-width: 0; }
.card-name {
  font-weight: 600; font-size: 14px; letter-spacing: -0.2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text);
}
.card-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }

.verdict-badge {
  padding: 3px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.verdict-badge.pipeline { background: var(--green-bg); color: var(--green); }
.verdict-badge.study { background: var(--yellow-bg); color: var(--yellow); }
.verdict-badge.later { background: var(--gray-bg); color: var(--text3); }

.card-desc {
  font-size: 12px; color: var(--text2); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

.card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  padding: 2px 8px; background: var(--bg3);
  border-radius: 20px; font-size: 11px;
  color: var(--text2); border: 1px solid var(--border);
}

.card-footer {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; padding-top: 11px; border-top: 1px solid var(--border);
}
.card-stat-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text3);
  font-weight: 600; margin-bottom: 3px;
}
.card-stat-value { font-size: 12px; font-weight: 600; color: var(--text); }

.score-wrap { display: flex; align-items: center; gap: 6px; }
.score-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.score-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; }
.score-num { font-size: 12px; font-weight: 700; color: var(--accent); min-width: 16px; }

.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 22px 0; flex-wrap: wrap;
}
.page-btn {
  padding: 6px 13px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: #fff;
  color: var(--text2); font-size: 13px;
  font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
}
.page-btn:hover { border-color: var(--accent); color: var(--accent); }
.page-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.loading-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 80px 20px;
  color: var(--text3); grid-column: 1/-1;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 80px 20px;
  color: var(--text3); text-align: center; grid-column: 1/-1;
}
.empty-state h3 { font-size: 15px; color: var(--text2); font-weight: 500; }

.error-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 60px 20px;
  text-align: center; grid-column: 1/-1;
}
.error-state h3 { font-size: 15px; color: var(--text); font-weight: 600; }
.error-state p { font-size: 13px; color: var(--text2); max-width: 400px; line-height: 1.6; }
.error-state code { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 6px; border-radius: 4px; }
.retry-btn {
  padding: 9px 20px; background: var(--accent); color: white;
  border: none; border-radius: var(--radius-sm);
  font-size: 13px; font-family: 'Inter', sans-serif;
  cursor: pointer; font-weight: 500;
}
.retry-btn:hover { background: var(--accent-dark); }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,20,35,0.45); backdrop-filter: blur(3px);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: #fff; border: 1px solid var(--border);
  border-radius: 14px; width: 100%; max-width: 620px;
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  transform: translateY(12px); transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal::-webkit-scrollbar { width: 3px; }
.modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.modal-stripe { height: 4px; background: var(--accent); border-radius: 14px 14px 0 0; }

.modal-header {
  padding: 18px 20px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 13px;
  position: sticky; top: 0; background: #fff; z-index: 1;
}
.modal-avatar {
  width: 48px; height: 48px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 18px; color: white; flex-shrink: 0;
}
.modal-name { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; color: var(--text); }
.modal-subtitle {
  font-size: 12px; color: var(--text3); margin-top: 4px;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.modal-close {
  width: 30px; height: 30px; border-radius: 6px;
  border: 1px solid var(--border); background: none;
  color: var(--text3); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; margin-left: auto;
}
.modal-close:hover { border-color: var(--text); color: var(--text); }

.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
.modal-section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text3); margin-bottom: 10px;
}
.modal-desc { font-size: 13px; color: var(--text2); line-height: 1.65; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 13px;
}
.stat-box-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text3); font-weight: 600; margin-bottom: 3px;
}
.stat-box-value { font-size: 15px; font-weight: 700; color: var(--text); }
.stat-box-value.accent { color: var(--accent); }
.stat-box-value.green { color: var(--green); }

.scoring-wrap {
  background: var(--bg2); border: 1px solid var(--border);
  border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 16px;
}
.scoring-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 16px;
}
.scoring-total-num {
  font-size: 32px; font-weight: 700;
  letter-spacing: -1px; color: var(--accent); line-height: 1;
}
.scoring-total-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.scoring-row { margin-bottom: 12px; }
.scoring-row:last-child { margin-bottom: 0; }
.scoring-row-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 5px;
}
.scoring-row-name { font-size: 13px; color: var(--text2); }
.scoring-row-val { font-size: 13px; font-weight: 700; color: var(--accent); }
.scoring-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.scoring-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.bar-market { background: var(--accent); }
.bar-edge { background: var(--green); }
.bar-complexity { background: #D97706; }

.investors-text { font-size: 13px; color: var(--text2); line-height: 1.7; }

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
  .cards-grid { grid-template-columns: 1fr; }
  .main { padding: 14px; }
  .header-top { padding: 0 16px; }
  .last-updated { display: none; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">
      Ventures<span class="logo-dot">.</span>
      <span class="logo-sub">база стартапов</span>
    </div>
    <div class="header-right">
      <span class="last-updated" id="last-updated"></span>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('ru')">РУ</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData(true)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        <span id="refresh-label">Обновить</span>
      </button>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="search" placeholder="Поиск компании..." oninput="applyFilters()">
    </div>

    <div class="filter-section">
      <div class="filter-label">Скоринг Яндекса</div>
      <div class="verdict-filters">
        <div class="verdict-chip active" data-verdict="all" onclick="setVerdict('all',this)">
          <span class="verdict-dot all"></span>
          <span data-ru="Все" data-en="All">Все</span>
          <span class="verdict-count" id="cnt-all">—</span>
        </div>
        <div class="verdict-chip" data-verdict="В pipeline" onclick="setVerdict('В pipeline',this)">
          <span class="verdict-dot pipeline"></span>
          <span data-ru="В pipeline" data-en="Pipeline">В pipeline</span>
          <span class="verdict-count" id="cnt-pipeline">—</span>
        </div>
        <div class="verdict-chip" data-verdict="Изучить" onclick="setVerdict('Изучить',this)">
          <span class="verdict-dot study"></span>
          <span data-ru="Изучить" data-en="Study">Изучить</span>
          <span class="verdict-count" id="cnt-study">—</span>
        </div>
        <div class="verdict-chip" data-verdict="Отложить" onclick="setVerdict('Отложить',this)">
          <span class="verdict-dot later"></span>
          <span data-ru="Отложить" data-en="Later">Отложить</span>
          <span class="verdict-count" id="cnt-later">—</span>
        </div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Вертикаль</div>
      <select class="filter-select" id="f-industry" onchange="applyFilters()">
        <option value="">Все вертикали</option>
      </select>
    </div>

    <div class="filter-section">
      <div class="filter-label">Стадия</div>
      <select class="filter-select" id="f-stage" onchange="applyFilters()">
        <option value="">Все стадии</option>
        <option value="Early Stage Venture">Early Stage</option>
        <option value="Late Stage Venture">Late Stage</option>
        <option value="Angel">Angel</option>
      </select>
    </div>

    <div class="filter-section">
      <div class="filter-label">Раунд</div>
      <select class="filter-select" id="f-round" onchange="applyFilters()">
        <option value="">Все раунды</option>
      </select>
    </div>

    <div class="filter-section">
      <div class="filter-label">Команда</div>
      <select class="filter-select" id="f-employees" onchange="applyFilters()">
        <option value="">Любой размер</option>
        <option value="1-10">1–10</option>
        <option value="11-50">11–50</option>
        <option value="51-100">51–100</option>
        <option value="101-250">101–250</option>
        <option value="251-500">251–500</option>
        <option value="501-1000">501–1000</option>
        <option value="1001-5000">1001–5000</option>
        <option value="5001-10000">5000+</option>
      </select>
    </div>

    <div class="filter-section">
      <div class="filter-label">Growth Score</div>
      <select class="filter-select" id="f-growth" onchange="applyFilters()">
        <option value="">Любой</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
    </div>

    <button class="reset-btn" onclick="resetFilters()">Сбросить фильтры</button>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div class="results-info" id="results-info"></div>
      <select class="sort-select" id="sort" onchange="applyFilters()">
        <option value="score">По скорингу</option>
        <option value="funding">По раунду</option>
        <option value="trend">По тренду</option>
        <option value="name">По алфавиту</option>
      </select>
    </div>
    <div class="cards-grid" id="cards-grid">
      <div class="loading-state">
        <div class="spinner"></div>
        <span>Загружаем данные из Google Sheets...</span>
      </div>
    </div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-stripe"></div>
    <div class="modal-header">
      <div class="modal-avatar" id="m-avatar"></div>
      <div style="flex:1;min-width:0">
        <div class="modal-name" id="m-name"></div>
        <div class="modal-subtitle" id="m-subtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<script>
const SHEET_ID = '1FPiPD7Kxd27IwM9OpdDr5dY2xk0B4qezh_2UhhWXCjM';

const VALID_INDUSTRIES = new Set([
  'Administrative Services','Advertising','Agriculture and Farming','Apps',
  'Artificial Intelligence (AI)','Biotechnology','Blockchain and Cryptocurrency',
  'Clothing and Apparel','Commerce and Shopping','Community and Lifestyle',
  'Consumer Electronics','Consumer Goods','Content and Publishing','Data and Analytics',
  'Design','Education','Energy','Events','Financial Services','Food and Beverage',
  'Gaming','Government and Military','Hardware','Health Care','Information Technology',
  'Internet Services','Legal','Lending and Investments','Manufacturing',
  'Media and Entertainment','Mobile','Music and Audio','Natural Resources',
  'Navigation and Mapping','Privacy and Security','Professional Services',
  'Real Estate','Robotics','Sales and Marketing','Science and Engineering',
  'Software','Sports','Sustainability','Transportation','Travel and Tourism',
  'Video','Wellness and Fitness'
]);

let companies = [], filtered = [];
let currentVerdict = 'all', currentLang = 'ru', currentPage = 1;
const PAGE_SIZE = 24;

// ---- CSV PARSER ----
function parseCSV(text) {
  const lines = text.split('\n');
  const headers = parseCSVLine(lines[0]);
  const rows = [];
  for(let i = 1; i < lines.length; i++) {
    if(!lines[i].trim()) continue;
    const vals = parseCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h.trim()] = (vals[idx] || '').trim(); });
    rows.push(obj);
  }
  return rows;
}

function parseCSVLine(line) {
  const result = []; let current = ''; let inQuotes = false;
  for(let i = 0; i < line.length; i++) {
    const ch = line[i];
    if(ch === '"') {
      if(inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if(ch === ',' && !inQuotes) {
      result.push(current); current = '';
    } else { current += ch; }
  }
  result.push(current);
  return result;
}

// ---- SCORING ----
function parseFundingM(val) {
  if(!val || val === 'nan') return 0;
  val = val.replace(/,/g,'').replace(/\$/g,'').trim();
  if(val.includes('B')) return parseFloat(val)*1000;
  if(val.includes('M')) return parseFloat(val);
  if(val.includes('K')) return parseFloat(val)/1000;
  try { return parseFloat(val)/1e6; } catch{ return 0; }
}

function calcScore(row) {
  const growth = (row['Growth Score Tier']||'').toLowerCase();
  const heat   = (row['Heat Score Tier']||'').toLowerCase();
  const stage  = (row['Investment Stage']||'').toLowerCase();
  const ind    = (row['Industry Groups']||'').toLowerCase();
  const fm     = parseFundingM(row['Last Funding Amount']);

  let market = 0;
  if(growth==='high') market=2; else if(growth==='medium') market=1;
  if(heat==='high' && market<2) market=Math.min(market+1,2);
  if(fm>100) market=Math.min(market+1,2);
  market=Math.min(market,2);

  const yv=['artificial intelligence','data','software','fintech','health',
            'logistics','e-commerce','media','education','cloud','financial'];
  const hits=yv.filter(v=>ind.includes(v)).length;
  const edge=hits>=3?2:hits>=1?1:0;
  const complexity=stage.includes('early')?2:1;
  const total=market+edge+complexity;
  const verdict=total>=5?'В pipeline':total>=3?'Изучить':'Отложить';
  return {market,edge,complexity,total,verdict};
}

function processRows(rows) {
  return rows
    .filter(r => !r['Operating Status'] || r['Operating Status']==='Active')
    .map(r => {
      const rawInd = r['Industry Groups']||'';
      const industries = rawInd.split(',').map(s=>s.trim()).filter(s=>VALID_INDUSTRIES.has(s));
      return {
        name: r['Organization Name']||'',
        description: r['Description']||'',
        full_description: r['Full Description']||'',
        industries,
        stage: r['Investment Stage']||'',
        last_funding_type: r['Last Funding Type']||'',
        last_funding_amount: r['Last Funding Amount']||'',
        last_funding_amount_m: parseFundingM(r['Last Funding Amount']),
        last_funding_date: r['Last Funding Date']||'',
        employees: r['Number of Employees']||'',
        revenue_range: r['Estimated Revenue Range']||'',
        growth_score: r['Growth Score Tier']||'',
        heat_score: r['Heat Score Tier']||'',
        trend_score: r['Trend Score (90 Days)']||'',
        lead_investors: r['Lead Investors']||'',
        top_investors: r['Top 5 Investors']||'',
        score: calcScore(r),
      };
    })
    .filter(c => c.name);
}

// ---- LOAD ----
async function loadData(manual=false) {
  const btn = document.getElementById('refresh-btn');
  const label = document.getElementById('refresh-label');
  btn.disabled=true; btn.classList.add('loading');
  label.textContent='Загрузка...';

  if(!manual) {
    document.getElementById('cards-grid').innerHTML=`
      <div class="loading-state">
        <div class="spinner"></div>
        <span>Загружаем данные из Google Sheets...</span>
      </div>`;
  }

  // Пробуем три метода по очереди
  const methods = [
    // Метод 1: прямой CSV экспорт (работает на Vercel)
    () => fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`),
    // Метод 2: через corsproxy.io
    () => fetch(`https://corsproxy.io/?${encodeURIComponent(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`)}`),
    // Метод 3: через allorigins
    () => fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)}&t=${Date.now()}`),
  ];

  let csv = null;
  let lastError = null;

  for(const method of methods) {
    try {
      const res = await method();
      if(res.ok) {
        const text = await res.text();
        if(text.includes(',') && text.length > 100) {
          csv = text; break;
        }
      }
    } catch(e) { lastError = e; }
  }

  if(csv) {
    try {
      const rows = parseCSV(csv);
      companies = processRows(rows);
      const now = new Date();
      document.getElementById('last-updated').textContent=
        `Обновлено: ${now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}`;
      initFilters();
      applyFilters();
    } catch(e) {
      showError('Ошибка парсинга данных', e.message);
    }
  } else {
    showError(
      'Не удалось загрузить данные',
      'Убедитесь что таблица открыта для всех по ссылке (Общий доступ → Все, у кого есть ссылка).',
      lastError?.message
    );
  }

  btn.disabled=false; btn.classList.remove('loading');
  label.textContent='Обновить';
}

function showError(title, message, detail='') {
  document.getElementById('cards-grid').innerHTML=`
    <div class="error-state">
      <h3>${title}</h3>
      <p>${message}</p>
      ${detail?`<code>${detail}</code>`:''}
      <button class="retry-btn" onclick="loadData(true)">Попробовать снова</button>
    </div>`;
}

// ---- FILTERS ----
function initFilters() {
  const industries = new Set();
  companies.forEach(c=>c.industries.forEach(i=>{if(i)industries.add(i);}));
  const isel = document.getElementById('f-industry');
  const icur = isel.value;
  isel.innerHTML='<option value="">Все вертикали</option>';
  [...industries].sort().forEach(i=>{
    const o=document.createElement('option');
    o.value=i; o.textContent=i;
    if(i===icur) o.selected=true;
    isel.appendChild(o);
  });

  const rounds = new Set();
  companies.forEach(c=>{if(c.last_funding_type&&c.last_funding_type!=='nan')rounds.add(c.last_funding_type);});
  const rsel = document.getElementById('f-round');
  const rcur = rsel.value;
  rsel.innerHTML='<option value="">Все раунды</option>';
  [...rounds].sort().forEach(r=>{
    const o=document.createElement('option');
    o.value=r; o.textContent=r;
    if(r===rcur) o.selected=true;
    rsel.appendChild(o);
  });

  const c={all:companies.length,pipeline:0,study:0,later:0};
  companies.forEach(x=>{
    if(x.score.verdict==='В pipeline') c.pipeline++;
    else if(x.score.verdict==='Изучить') c.study++;
    else c.later++;
  });
  document.getElementById('cnt-all').textContent=c.all;
  document.getElementById('cnt-pipeline').textContent=c.pipeline;
  document.getElementById('cnt-study').textContent=c.study;
  document.getElementById('cnt-later').textContent=c.later;
}

function setVerdict(v,el) {
  currentVerdict=v;
  document.querySelectorAll('.verdict-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentPage=1; applyFilters();
}

function applyFilters() {
  const q   = document.getElementById('search').value.toLowerCase().trim();
  const ind = document.getElementById('f-industry').value;
  const st  = document.getElementById('f-stage').value;
  const rn  = document.getElementById('f-round').value;
  const em  = document.getElementById('f-employees').value;
  const gr  = document.getElementById('f-growth').value;
  const so  = document.getElementById('sort').value;

  filtered = companies.filter(c=>{
    if(currentVerdict!=='all' && c.score.verdict!==currentVerdict) return false;
    if(q){
      const hay=(c.name+' '+c.description+' '+c.full_description+' '+c.industries.join(' ')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    if(ind && !c.industries.includes(ind)) return false;
    if(st && c.stage!==st) return false;
    if(rn && c.last_funding_type!==rn) return false;
    if(em && c.employees!==em) return false;
    if(gr && c.growth_score!==gr) return false;
    return true;
  });

  filtered.sort((a,b)=>{
    if(so==='score')   return b.score.total-a.score.total;
    if(so==='funding') return b.last_funding_amount_m-a.last_funding_amount_m;
    if(so==='trend')   return parseFloat(b.trend_score||0)-parseFloat(a.trend_score||0);
    if(so==='name')    return a.name.localeCompare(b.name);
    return 0;
  });

  currentPage=1; renderCards();
}

function resetFilters() {
  document.getElementById('search').value='';
  ['f-industry','f-stage','f-round','f-employees','f-growth'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('sort').value='score';
  currentVerdict='all';
  document.querySelectorAll('.verdict-chip').forEach((c,i)=>c.classList.toggle('active',i===0));
  currentPage=1; applyFilters();
}

// ---- RENDER ----
const COLORS=[
  ['#F0531C','#C93D10'],['#2563EB','#1D4ED8'],['#059669','#047857'],
  ['#7C3AED','#6D28D9'],['#D97706','#B45309'],['#0891B2','#0E7490'],
  ['#DB2777','#BE185D'],['#4F46E5','#4338CA']
];

function avatarStyle(name){
  let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h);
  const [c1,c2]=COLORS[Math.abs(h)%COLORS.length];
  return `background:linear-gradient(135deg,${c1},${c2})`;
}

function initials(name){
  return name.split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
}

function vc(v){ return v==='В pipeline'?'pipeline':v==='Изучить'?'study':'later'; }
function vl(v){
  if(currentLang==='en'){
    return v==='В pipeline'?'Pipeline':v==='Изучить'?'Study':'Later';
  }
  return v;
}
function clean(val){ return (!val||val==='nan')?'':val; }

function renderCards(){
  const grid=document.getElementById('cards-grid');
  const info=document.getElementById('results-info');
  const total=filtered.length;
  const start=(currentPage-1)*PAGE_SIZE;
  const page=filtered.slice(start,start+PAGE_SIZE);

  info.innerHTML=`Показано <strong>${Math.min(start+PAGE_SIZE,total)}</strong> из <strong>${total}</strong>`;

  if(!page.length){
    grid.innerHTML=`<div class="empty-state">
      <h3>Ничего не найдено</h3>
      <p>Попробуйте изменить фильтры</p>
    </div>`;
    document.getElementById('pagination').innerHTML='';
    return;
  }

  grid.innerHTML=page.map((c,i)=>{
    const desc=clean(c.description)||clean(c.full_description);
    const short=desc?desc.substring(0,160):'';
    const tags=c.industries.slice(0,3);
    const funding=clean(c.last_funding_amount);
    const round=clean(c.last_funding_type);
    const growth=clean(c.growth_score);
    const gc=growth==='High'?'var(--green)':growth==='Medium'?'#D97706':'var(--text3)';

    return `<div class="card" onclick="openModal(${start+i})">
      <div class="card-header">
        <div class="company-avatar" style="${avatarStyle(c.name)}">${initials(c.name)}</div>
        <div class="card-title-wrap">
          <div class="card-name">${c.name}</div>
          <div class="card-meta">${round||'—'}${c.employees?' · '+c.employees:''}</div>
        </div>
        <span class="verdict-badge ${vc(c.score.verdict)}">${vl(c.score.verdict)}</span>
      </div>
      ${short?`<div class="card-desc">${short}</div>`:''}
      ${tags.length?`<div class="card-tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
      <div class="card-footer">
        <div>
          <div class="card-stat-label">Раунд</div>
          <div class="card-stat-value" style="font-size:11px">${funding||'—'}</div>
        </div>
        <div>
          <div class="card-stat-label">Growth</div>
          <div class="card-stat-value" style="color:${gc}">${growth||'—'}</div>
        </div>
        <div>
          <div class="card-stat-label">Score</div>
          <div class="score-wrap">
            <div class="score-bar"><div class="score-bar-fill" style="width:${c.score.total/6*100}%"></div></div>
            <div class="score-num">${c.score.total}</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  renderPagination(total);
}

function renderPagination(total){
  const pages=Math.ceil(total/PAGE_SIZE);
  const pag=document.getElementById('pagination');
  if(pages<=1){pag.innerHTML='';return;}
  let html=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
  const range=[];
  for(let i=1;i<=pages;i++){
    if(i===1||i===pages||Math.abs(i-currentPage)<=2) range.push(i);
    else if(range[range.length-1]!=='...') range.push('...');
  }
  range.forEach(p=>{
    if(p==='...') html+=`<span style="color:var(--text3);padding:0 4px">…</span>`;
    else html+=`<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>→</button>`;
  pag.innerHTML=html;
}

function goPage(p){
  currentPage=p; renderCards();
  window.scrollTo({top:54,behavior:'smooth'});
}

// ---- MODAL ----
function openModal(idx){
  const c=filtered[idx]; if(!c) return;
  document.getElementById('m-avatar').style=avatarStyle(c.name);
  document.getElementById('m-avatar').textContent=initials(c.name);
  document.getElementById('m-name').textContent=c.name;

  const round=clean(c.last_funding_type);
  const amount=clean(c.last_funding_amount);
  document.getElementById('m-subtitle').innerHTML=
    `${round?`<span>${round}</span>`:''}${amount?`<span>·</span><span>${amount}</span>`:''}
     <span class="verdict-badge ${vc(c.score.verdict)}" style="margin-left:4px">${vl(c.score.verdict)}</span>`;

  const desc=clean(c.full_description)||clean(c.description);
  const investors=clean(c.top_investors)||clean(c.lead_investors);
  const sc=c.score.total>=5?'var(--green)':c.score.total>=3?'#D97706':'var(--text3)';

  document.getElementById('m-body').innerHTML=`
    ${desc?`<div>
      <div class="modal-section-title">О компании</div>
      <div class="modal-desc">${desc}</div>
    </div>`:''}
    <div>
      <div class="modal-section-title">Метрики</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-box-label">Привлечено</div>
          <div class="stat-box-value accent">${clean(c.last_funding_amount)||'—'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Раунд</div>
          <div class="stat-box-value">${clean(c.last_funding_type)||'—'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Команда</div>
          <div class="stat-box-value">${clean(c.employees)||'—'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Выручка</div>
          <div class="stat-box-value">${clean(c.revenue_range)||'—'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Growth Score</div>
          <div class="stat-box-value ${c.growth_score==='High'?'green':''}">${clean(c.growth_score)||'—'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Trend 90d</div>
          <div class="stat-box-value accent">${c.trend_score?parseFloat(c.trend_score).toFixed(1):'—'}</div>
        </div>
      </div>
    </div>
    <div>
      <div class="modal-section-title">Скоринг Яндекса</div>
      <div class="scoring-wrap">
        <div class="scoring-header">
          <div>
            <div class="scoring-total-num" style="color:${sc}">${c.score.total}<span style="font-size:16px;color:var(--text3);font-weight:400">/6</span></div>
            <div class="scoring-total-sub">итоговый балл</div>
          </div>
          <span class="verdict-badge ${vc(c.score.verdict)}" style="font-size:13px;padding:5px 12px">${vl(c.score.verdict)}</span>
        </div>
        <div class="scoring-row">
          <div class="scoring-row-header">
            <span class="scoring-row-name">Рынок</span>
            <span class="scoring-row-val">${c.score.market}/2</span>
          </div>
          <div class="scoring-bar"><div class="scoring-bar-fill bar-market" style="width:${c.score.market/2*100}%"></div></div>
        </div>
        <div class="scoring-row">
          <div class="scoring-row-header">
            <span class="scoring-row-name">Edge Яндекса</span>
            <span class="scoring-row-val" style="color:var(--green)">${c.score.edge}/2</span>
          </div>
          <div class="scoring-bar"><div class="scoring-bar-fill bar-edge" style="width:${c.score.edge/2*100}%"></div></div>
        </div>
        <div class="scoring-row">
          <div class="scoring-row-header">
            <span class="scoring-row-name">Сложность входа</span>
            <span class="scoring-row-val" style="color:#D97706">${c.score.complexity}/2</span>
          </div>
          <div class="scoring-bar"><div class="scoring-bar-fill bar-complexity" style="width:${c.score.complexity/2*100}%"></div></div>
        </div>
      </div>
    </div>
    ${investors?`<div>
      <div class="modal-section-title">Инвесторы</div>
      <div class="investors-text">${investors}</div>
    </div>`:''}
    ${c.industries.length?`<div>
      <div class="modal-section-title">Вертикали</div>
      <div class="card-tags">${c.industries.map(i=>`<span class="tag">${i}</span>`).join('')}</div>
    </div>`:''}
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e){
  if(e.target===document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});

function setLang(lang){
  currentLang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim().toLowerCase().includes(lang==='ru'?'ру':'en'));
  });
  if(companies.length) renderCards();
}

loadData();
</script>
</body>
</html>
